<div class="split-img reveal" style="min-height:520px; display: flex; align-items: center; justify-content: center; background: #050505; border: 1px solid #222; position: relative; overflow: hidden;">
    
    <svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <style>
            .line { stroke: #c9a84c; stroke-width: 1; opacity: 0.2; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 3s ease-in-out forwards infinite; }
            .node { fill: #c9a84c; filter: drop-shadow(0 0 8px #c9a84c); }
            .node-text { font-family: 'Barlow Condensed', sans-serif; fill: #fff; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
            @keyframes draw { to { stroke-dashoffset: 0; } }
            @keyframes pulse { 0% { r: 4; opacity: 1; } 100% { r: 12; opacity: 0; } }
            .pulse-circle { fill: #c9a84c; animation: pulse 2s infinite; }
        </style>

        <circle class="node" cx="200" cy="200" r="6"/>
        <circle class="pulse-circle" cx="200" cy="200" r="4"/>
        <text class="node-text" x="175" y="225">THE VILLA</text>

        <line class="line" x1="200" y1="200" x2="100" y2="100" />
        <circle class="node" cx="100" cy="100" r="4"/>
        <text class="node-text" x="50" y="90">GUEST DATA</text>

        <line class="line" x1="200" y1="200" x2="300" y2="100" />
        <circle class="node" cx="300" cy="100" r="4"/>
        <text class="node-text" x="280" y="90">BRAND VOICE</text>

        <line class="line" x1="200" y1="200" x2="100" y2="300" />
        <circle class="node" cx="100" cy="300" r="4"/>
        <text class="node-text" x="60" y="325">MARKET RATES</text>

        <line class="line" x1="200" y1="200" x2="300" y2="300" />
        <circle class="node" cx="300" cy="300" r="4"/>
        <text class="node-text" x="270" y="325">EN / ES / FR</text>
    </svg>
</div>
